<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vectron Arcade</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050510;
            font-family: 'Courier New', monospace;
            color: #00ffc8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Tab bar */
        .tab-bar {
            display: flex;
            background: rgba(0, 10, 15, 0.95);
            border-bottom: 1px solid rgba(0, 255, 200, 0.2);
            z-index: 9999;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 44px;
        }

        .tab-bar .brand {
            display: flex;
            align-items: center;
            padding: 0 16px;
            font-size: 14px;
            color: #00ffc8;
            text-shadow: 0 0 10px rgba(0, 255, 200, 0.4);
            letter-spacing: 3px;
            white-space: nowrap;
        }

        .tab {
            display: flex;
            align-items: center;
            padding: 0 20px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #667;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            text-decoration: none;
        }

        .tab:hover {
            color: #aaa;
            background: rgba(0, 255, 200, 0.03);
        }

        .tab.active {
            color: #00ffc8;
            border-bottom-color: #00ffc8;
            text-shadow: 0 0 8px rgba(0, 255, 200, 0.4);
        }

        .tab .tab-icon {
            margin-right: 8px;
            font-size: 16px;
        }

        /* Game frame */
        .game-frame {
            flex: 1;
            margin-top: 44px;
            width: 100%;
            height: calc(100vh - 44px);
            border: none;
        }

        /* Mobile */
        @media (max-width: 600px) {
            .tab-bar .brand { display: none; }
            .tab { padding: 0 12px; font-size: 11px; }
            .tab .tab-icon { margin-right: 4px; }
        }
    </style>
</head>
<body>
    <div class="tab-bar">
        <div class="brand">VECTRON</div>
        <a class="tab active" id="tab-td" onclick="switchGame('td')">
            <span class="tab-icon">🏰</span> Tower Defense
        </a>
        <a class="tab" id="tab-scorched" onclick="switchGame('scorched')">
            <span class="tab-icon">💥</span> Scorched
        </a>
    </div>

    <iframe class="game-frame" id="game-frame" src="td.html"></iframe>

    <script>
        function switchGame(game) {
            const frame = document.getElementById('game-frame');
            const tabTD = document.getElementById('tab-td');
            const tabScorched = document.getElementById('tab-scorched');

            if (game === 'td') {
                frame.src = 'td.html';
                tabTD.classList.add('active');
                tabScorched.classList.remove('active');
            } else {
                frame.src = 'scorched/index.html';
                tabScorched.classList.add('active');
                tabTD.classList.remove('active');
            }
        }
    </script>
</body>
</html>
